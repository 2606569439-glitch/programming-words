            border-radius: 15px;
            display: flex;

            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .phonetic {
            font-size: 16px;
            color: #888;
            margin-bottom: 10px;
        }

            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .meaning {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        .example {
            font-size: 14px;
            color: #666;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 10px;
            max-width: 100%;
        }
        .category {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

            background: white;
            color: #667eea;

        let currentIndex = 0;
        let isFlipped = false;
        let shuffled = false;

        function updateCard() {
            const word = words[currentIndex];
            document.getElementById('word').textContent = word.word;
            document.getElementById('meaning').textContent = word.meaning;
            document.getElementById('example').textContent = word.example;
            document.getElementById('category').textContent = word.category;
            document.getElementById('progress').textContent = `${currentIndex + 1} / ${words.length}`;
            isFlipped = false;
            document.getElementById('card').classList.remove('flipped');
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('card').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                alert('🎉 恭喜！你已经学完所有单词！\n\n点"打乱顺序"再来一轮，或者从头开始复习！');
                currentIndex = 0;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function shuffleCards() {
            shuffled = !shuffled;
            if (shuffled) {
                for (let i = words.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [words[i], words[j]] = [words[j], words[i]];
                }
                document.getElementById('shuffleInfo').textContent = '🔀 已打乱顺序';
            } else {
                location.reload();
            }
            currentIndex = 0;
            updateCard();
        }

        function speak() {
            const word = words[currentIndex].word;
            
            // 方法 1：先尝试浏览器自带 TTS
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
                return;
            }
            
            // 方法 2：用有道 TTS（需要联网）
            try {
                const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=1`);
                audio.play();
            } catch (e) {
                // 方法 3：用 Google TTS（备用）
                try {
                    const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=en&client=tw-ob`);
                    audio.play();
                } catch (e2) {
                    alert('发音失败，请检查网络连接');
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
            if (e.key === 'Enter' || e.key === 'ArrowUp' || e.key === 'ArrowDown') flipCard();
        });

        updateCard();
    </script>
